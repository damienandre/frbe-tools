<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}frbe-tools{% endblock %}</title>
  <link rel="stylesheet" href="/static/app.css">
  <script src="/static/htmx.min.js" defer></script>
  <script src="/static/app.js" defer></script>
  {% block head %}{% endblock %}
</head>
<body>
  <header>
    <a class="brand" href="/">♟ frbe-tools</a>
    <nav>
      {% for path, label in nav %}
        <a href="{{ path }}" class="{{ 'on' if active == path or (path != '/' and active.startswith(path)) }}">{{ label }}</a>
      {% endfor %}
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  {% block scripts %}{% endblock %}
</body>
</html>
